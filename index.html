<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>A判用紙 拡大率シミュレーター</title>

<style>

body{
    font-family:"Yu Gothic",sans-serif;
    text-align:center;
    margin:20px;
}

h1{
    font-size:2rem;
}

.control{
    margin:20px 0;
}

label{
    font-size:1.2rem;
    font-weight:bold;
}

input[type="number"]{
    font-size:1.4rem;
    width:160px;
    text-align:center;
}

input[type="range"]{
    width:80%;
}

select{
    font-size:1.2rem;
    padding:6px;
}

#paperArea{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:80px;
    margin-top:30px;
    min-height:500px;
}

.paperGroup{
    text-align:center;
}

.paperLabel{
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:10px;
}

.paper{
    background:white;
    border:3px solid black;
    box-sizing:border-box;
    padding:12px;
    overflow:hidden;
}

#a4Paper{
    width:148px;
    height:210px;
}

#scaledPaper{
    width:148px;
    height:210px;
}

.sampleText{
    text-align:left;
    line-height:1.4;
    word-break:break-all;
}

.baseText{
    font-size:10pt;
}

#info{
    font-size:1.3rem;
    margin-top:20px;
    line-height:1.8;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>A判用紙 拡大率シミュレーター</h1>

<div class="control">
<label>表示する小数桁数</label>
<br><br>

<select id="decimalSelect">
<option value="0">整数</option>
<option value="1">0.1まで</option>
<option value="2">0.01まで</option>
</select>
</div>

<div class="control">
<label>基準文字サイズ (pt)</label>
<br><br>

<input
type="number"
id="baseSize"
value="10"
min="1"
step="0.1">
</div>

<div class="control">
<label>拡大率 (%)</label>
<br><br>

<input
type="number"
id="scaleInput"
value="100">
</div>

<div id="paperArea">

<div class="paperGroup">

<div class="paperLabel">
基準（A4）
</div>

<div id="a4Paper" class="paper">

<div id="baseText" class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

</div>

</div>

<div class="paperGroup">

<div class="paperLabel">
拡大後
</div>

<div id="scaledPaper" class="paper">

<div id="scaledText" class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

</div>

</div>

</div>

<div class="control">

<input
type="range"
id="scaleSlider"
min="10"
max="300"
value="100">

</div>

<div id="info"></div>

<script>

const scaleInput =
document.getElementById("scaleInput");

const scaleSlider =
document.getElementById("scaleSlider");

const scaledPaper =
document.getElementById("scaledPaper");

const scaledText =
document.getElementById("scaledText");

const baseText =
document.getElementById("baseText");

const info =
document.getElementById("info");

const decimalSelect =
document.getElementById("decimalSelect");

const baseSize =
document.getElementById("baseSize");

function updateStep(){

    const decimals =
    Number(decimalSelect.value);

    const step =
    Math.pow(10,-decimals);

    scaleInput.step = step;
    scaleSlider.step = step;
}

function updateDisplay(){

    let scale =
    parseFloat(scaleInput.value);

    if(isNaN(scale)){
        scale = 100;
    }

    const decimals =
    Number(decimalSelect.value);

    const basePt =
    parseFloat(baseSize.value) || 10;

    scaleSlider.value = scale;

    const width =
    148 * scale / 100;

    const height =
    210 * scale / 100;

    scaledPaper.style.width =
    width + "px";

    scaledPaper.style.height =
    height + "px";

    baseText.style.fontSize =
    basePt + "pt";

    const currentPt =
    basePt * scale / 100;

    scaledText.style.fontSize =
    currentPt + "pt";

    const realWidth =
    210 * scale / 100;

    const realHeight =
    297 * scale / 100;

    const areaRatio =
    Math.pow(scale/100,2);

    info.innerHTML =

    `基準文字サイズ：${basePt.toFixed(decimals)} pt<br><br>

     拡大後の文字サイズ：${currentPt.toFixed(decimals)} pt<br><br>

     横 210 mm → ${realWidth.toFixed(decimals)} mm<br>

     縦 297 mm → ${realHeight.toFixed(decimals)} mm<br><br>`;

}

decimalSelect.addEventListener(
"change",
()=>{
    updateStep();
    updateDisplay();
}
);

scaleInput.addEventListener(
"input",
updateDisplay
);

baseSize.addEventListener(
"input",
updateDisplay
);

scaleSlider.addEventListener(
"input",
()=>{
    scaleInput.value =
    scaleSlider.value;

    updateDisplay();
}
);

updateStep();
updateDisplay();

</script>

</body>
</html>
